<!-- About Section: Premium Image Carousel -->
<div class="relative w-full overflow-hidden"
  *ngIf="aboutSteps.length > 0"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)">

  <!-- Background Images (stacked, cross-fade via opacity) -->
  <div
    *ngFor="let step of aboutSteps; let i = index"
    class="absolute inset-0 bg-cover bg-center bg-no-repeat"
    [ngStyle]="{'background-image': 'url(' + step.bgImage + ')'}"
    [style.opacity]="i === currentIndex ? 1 : 0"
    [style.transition]="'opacity 700ms ease-in-out'">
  </div>

  <!-- Content wrapper (provides height and holds overlays) -->
  <div class="relative w-full min-h-[85vh] md:min-h-screen">

    <!-- Multi-layered Overlay for premium depth -->
    <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-black/60 to-black/30"></div>
    <div class="absolute inset-0 bg-gradient-to-r from-[#0a0a0a]/40 to-transparent"></div>

    <!-- Content -->
    <div class="relative z-10 min-h-[85vh] md:min-h-screen flex items-end md:items-center pb-20 md:pb-0">
      <div class="max-w-6xl w-full mx-auto px-6 lg:px-8">
        <div class="max-w-2xl" [@fadeAnimation]="currentIndex">
          <!-- Section Label -->
          <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/[0.08] border border-white/[0.1] text-xs text-neutral-400 uppercase tracking-widest mb-6">
            <span class="w-1.5 h-1.5 rounded-full bg-brand-400"></span>
            About Me
          </div>

          <!-- Title -->
          <h2 class="font-display text-3xl sm:text-4xl md:text-5xl font-bold text-white leading-tight mb-6">
            {{ aboutSteps[currentIndex].title }}
          </h2>

          <!-- Content -->
          <p class="text-base md:text-lg text-neutral-300 leading-relaxed max-w-xl">
            {{ aboutSteps[currentIndex].content }}
          </p>
        </div>

        <!-- Progress Dots & Counter -->
        <div class="flex items-center gap-6 mt-10">
          <!-- Dots -->
          <div class="flex items-center gap-2">
            <button
              *ngFor="let step of aboutSteps; let i = index"
              (click)="goTo(i)"
              class="relative h-1 rounded-full transition-all duration-500 cursor-pointer"
              [ngClass]="{
                'w-8 bg-brand-400': i === currentIndex,
                'w-3 bg-white/20 hover:bg-white/40': i !== currentIndex
              }"
              [attr.aria-label]="'Go to slide ' + (i + 1)">
            </button>
          </div>

          <!-- Counter -->
          <span class="text-xs text-neutral-500 font-mono">
            {{ (currentIndex + 1).toString().padStart(2, '0') }} / {{ aboutSteps.length.toString().padStart(2, '0') }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Navigation Arrows -->
  <button
    (click)="prev()"
    class="absolute top-1/2 left-4 md:left-8 -translate-y-1/2 z-20 w-12 h-12 rounded-full glass-card flex items-center justify-center text-white/70 hover:text-white hover:bg-white/[0.1] transition-all duration-300 group"
    aria-label="Previous slide">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:-translate-x-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7" />
    </svg>
  </button>

  <button
    (click)="next()"
    class="absolute top-1/2 right-4 md:right-8 -translate-y-1/2 z-20 w-12 h-12 rounded-full glass-card flex items-center justify-center text-white/70 hover:text-white hover:bg-white/[0.1] transition-all duration-300 group"
    aria-label="Next slide">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7" />
    </svg>
  </button>
</div>
