<section class="relative py-24 px-6 lg:px-8 overflow-hidden">
  <!-- Ambient Glow -->
  <div class="ambient-glow w-[400px] h-[400px] bg-brand-500/15 -top-32 -right-32 absolute"></div>
  <div class="ambient-glow w-[300px] h-[300px] bg-violet-500/10 bottom-0 -left-24 absolute"></div>

  <div class="relative z-10 max-w-6xl mx-auto">
    <!-- Section Header -->
    <div class="text-center mb-16">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/[0.04] border border-white/[0.08] text-xs text-neutral-400 uppercase tracking-widest mb-4">
        <span class="w-1.5 h-1.5 rounded-full bg-brand-400"></span>
        Experience
      </div>
      <h2 class="font-display text-3xl sm:text-4xl md:text-5xl font-bold text-white">
        {{ title }}
      </h2>
      <p class="text-neutral-500 mt-3 text-lg">{{ calculateYearsInDecimal('09-July-2018') }}+ years of professional experience</p>
      <div class="section-divider mt-6"></div>
    </div>

    <!-- Timeline -->
    <div class="relative">
      <!-- Vertical Line (desktop) -->
      <div class="hidden md:block absolute left-1/2 top-0 bottom-0 w-px bg-gradient-to-b from-transparent via-white/[0.08] to-transparent"></div>

      <!-- Career Cards -->
      <div class="space-y-12 md:space-y-16">
        <div
          *ngFor="let job of careerList; let i = index; let even = even"
          class="career-card opacity-0 blur-sm transform transition-all duration-700 ease-out relative"
          [ngClass]="{
            'translate-x-[-40px]': i % 2 === 0,
            'translate-x-[40px]': i % 2 !== 0
          }">

          <!-- Desktop: Alternating layout -->
          <div class="md:flex md:items-start md:gap-12"
            [ngClass]="{'md:flex-row-reverse': !even}">

            <!-- Card -->
            <div class="md:w-[calc(50%-1.5rem)] w-full">
              <div class="glass-card glass-card-hover rounded-2xl p-6 md:p-8 transition-all duration-300 group">
                <!-- Period Badge -->
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-500/10 border border-brand-500/20 text-xs text-brand-300 font-medium mb-4">
                  <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                  </svg>
                  {{ job.period }}
                </div>

                <!-- Role & Company -->
                <h3 class="font-display text-xl md:text-2xl font-bold text-white mb-1 group-hover:text-brand-300 transition-colors duration-300">
                  {{ job.role }}
                </h3>
                <p class="text-neutral-400 text-sm font-medium mb-5">{{ job.company }}</p>

                <!-- Points -->
                <ul class="space-y-3">
                  <li *ngFor="let point of job.points" class="flex items-start gap-3 text-sm text-neutral-300/90 leading-relaxed">
                    <span class="mt-1.5 w-1.5 h-1.5 rounded-full bg-brand-500 shrink-0"></span>
                    {{ point }}
                  </li>
                </ul>
              </div>
            </div>

            <!-- Timeline Dot (desktop) -->
            <div class="hidden md:flex md:w-0 items-center justify-center absolute left-1/2 -translate-x-1/2 top-8">
              <div class="w-3 h-3 rounded-full bg-brand-500 ring-4 ring-brand-500/20 ring-offset-2 ring-offset-[#0a0a0a]"></div>
            </div>

            <!-- Spacer for the other side -->
            <div class="hidden md:block md:w-[calc(50%-1.5rem)]"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
